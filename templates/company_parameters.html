{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
  <h1 class="h3 mb-0">Parâmetros da Empresa</h1>
  <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Voltar</a>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="post" class="row g-3">
      <div class="col-12">
        <label for="company_name" class="form-label">Nome da empresa</label>
        <input
          type="text"
          id="company_name"
          name="company_name"
          class="form-control"
          maxlength="120"
          value="{{ company_name }}"
          required
        >
      </div>

      <div class="col-12">
        <label for="company_address" class="form-label">Endereço da empresa</label>
        <input
          type="text"
          id="company_address"
          name="company_address"
          class="form-control"
          maxlength="255"
          value="{{ company_address }}"
          required
        >
      </div>

      <div class="col-12">
        <label for="company_logo" class="form-label">Logo da empresa (URL ou caminho local)</label>
        <input
          type="text"
          id="company_logo"
          name="company_logo"
          class="form-control"
          value="{{ company_logo }}"
          placeholder="Ex.: static/logo.png ou https://site.com/logo.png"
        >
        <div class="form-text">Opcional. Se vazio, o relatório será gerado sem logo.</div>
      </div>

      <div class="col-12 col-md-6">
        <label for="monthly_hours_allowance" class="form-label">Franquia mensal de horas</label>
        <input
          type="number"
          id="monthly_hours_allowance"
          name="monthly_hours_allowance"
          class="form-control"
          min="0"
          step="0.01"
          value="{{ monthly_hours_allowance }}"
          required
        >
        <div class="form-text">Horas mensais incluídas na franquia (ex.: 16).</div>
      </div>

      <div class="col-12 col-md-6">
        <label for="hours_bank_closing_date" class="form-label">Data de fechamento do banco de horas</label>
        <input
          type="date"
          id="hours_bank_closing_date"
          name="hours_bank_closing_date"
          class="form-control"
          value="{{ hours_bank_closing_date }}"
          required
        >
        <div class="form-text">A cada 6 meses, a partir desta data, o acumulado será zerado.</div>
      </div>

      <div class="col-12">
        <button type="submit" class="btn btn-primary">Salvar parâmetros</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
