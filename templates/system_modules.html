{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
  <h1 class="h3 mb-0">Módulos do Sistema</h1>
  <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Voltar</a>
</div>

<div class="card border-0 shadow-sm mb-3">
  <div class="card-body">
    <form method="post" class="row g-2">
      <div class="col-12 col-md-9">
        <label for="name" class="form-label">Nome do módulo</label>
        <input type="text" id="name" name="name" class="form-control" maxlength="120" required>
      </div>
      <div class="col-12 col-md-3 d-grid align-self-end">
        <button type="submit" class="btn btn-primary">Cadastrar módulo</button>
      </div>
    </form>
  </div>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-striped align-middle mb-0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Módulo</th>
            <th>Situação</th>
            <th class="text-end">Ações</th>
          </tr>
        </thead>
        <tbody>
          {% for module in modules %}
          <tr>
            <td>#{{ module.id }}</td>
            <td>{{ module.name }}</td>
            <td>{{ "Ativo" if module.is_active else "Inativo" }}</td>
            <td class="text-end">
              <form method="post" action="{{ url_for('toggle_system_module', module_id=module.id) }}" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm">
                  {{ "Inativar" if module.is_active else "Ativar" }}
                </button>
              </form>
            </td>
          </tr>
          {% else %}
          <tr>
            <td colspan="4" class="text-center">Nenhum módulo cadastrado.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
