{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 mb-0">Editar atividade</h1>
  <a href="{{ url_for('ticket_detail', ticket_id=ticket.id) }}" class="btn btn-outline-secondary">Voltar</a>
</div>

<div class="card">
  <div class="card-body">
    <p class="text-muted mb-3">Chamado #{{ ticket.id }} - {{ ticket.title }}</p>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Atividade realizada</label>
        <textarea class="form-control" name="notes" rows="4" required>{{ activity.notes }}</textarea>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Início</label>
          <input
            class="form-control"
            type="datetime-local"
            name="started_at"
            value="{{ activity.started_at.strftime('%Y-%m-%dT%H:%M') }}"
            required
          >
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Fim</label>
          <input
            class="form-control"
            type="datetime-local"
            name="ended_at"
            value="{{ activity.ended_at.strftime('%Y-%m-%dT%H:%M') }}"
            required
          >
        </div>
      </div>
      <button class="btn btn-primary" type="submit">Salvar alterações</button>
    </form>
  </div>
</div>
{% endblock %}
